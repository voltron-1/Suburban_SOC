id: HUNT-005
title: LOLBin file downloads (certutil / curl / wget / bitsadmin)
hypothesis: >
  Built-in download utilities pulling content over HTTP are a common ingress-tool
  -transfer technique, often used to stage second-stage payloads.
attack: [T1105]
data_source: Sysmon/Winlogbeat process_creation
index: logstash-security-*
query: 'process.executable:(*certutil.exe* OR *curl.exe* OR *wget.exe* OR *bitsadmin.exe*) AND process.args:(*http* OR *urlcache* OR *transfer*)'
threshold: 1
status: active
notes: Complements the bitsadmin Sigma rule; certutil/curl variants are detection candidates.
