# =============================================================================
# Suburban-SOC — Winlogbeat configuration (Endpoint Dashboard, Component 3)
# Deploy on Windows lab hosts to ship Sysmon + Security + System + WMI-Activity +
# PowerShell events to the SOC Logstash pipeline (:5044). Parsed by
# configs/logstash.conf Category 2.
#
# Prereqs on the host:
#   - Sysmon installed with a config (e.g. SwiftOnSecurity) for Event IDs below
#   - Winlogbeat 9.x installed as a service
#   - Advanced Audit Policy: "Audit Special Logon" (Logon/Logoff) for Security
#     4672 — on by default in most modern baselines
#   - Advanced Audit Policy: "Audit Security Group Management" (Account
#     Management) for Security 4728/4756 (4728/4756 are domain-controller-only)
#   - Group Policy: "Turn on PowerShell Script Block Logging" (Administrative
#     Templates > Windows Components > Windows PowerShell) for 4103/4104
#   - Microsoft-Windows-WMI-Activity/Operational is enabled by default on
#     Windows 8 / Server 2012 and later — no additional policy needed
# Install:  .\winlogbeat.exe -c winlogbeat.yml -e
# =============================================================================

winlogbeat.event_logs:
  # Sysmon — process creation (1), network (3), image load (7), driver (8),
  # file create (11), registry (13), file stream (15)
  - name: Microsoft-Windows-Sysmon/Operational
    event_id: 1, 3, 7, 8, 11, 13, 15

  # Windows Security — logon success/failure, explicit creds, special privs,
  # account creation, group membership changes (local/global/universal),
  # audit-log-cleared (1102). See rules/sigma/auth_win_*.yml (issue #192).
  - name: Security
    event_id: 1102, 4624, 4625, 4648, 4672, 4720, 4728, 4732, 4756

  # Windows System — reboots / service control manager, event-log cleared (104),
  # service start-type changes (7040), new service installs (7045). See
  # rules/sigma/system_win_*.yml (issue #192).
  - name: System
    event_id: 104, 1074, 6005, 6006, 6008, 7040, 7045

  # WMI persistence — permanent event filter/consumer bindings (T1546.003).
  # Channel is enabled by default on Win8+ / Server 2012+; no audit-policy
  # prerequisite. See rules/sigma/wmi_win_event_subscription_binding.yml
  # (issue #192).
  - name: Microsoft-Windows-WMI-Activity/Operational
    event_id: 5861

  # PowerShell script-block logging (T1059.001/T1027). Requires the "Turn on
  # PowerShell Script Block Logging" GPO (Administrative Templates > Windows
  # Components > Windows PowerShell). See
  # rules/sigma/posh_ps_obfuscated_scriptblock.yml (issue #192).
  - name: Microsoft-Windows-PowerShell/Operational
    event_id: 4103, 4104

# Tag so Logstash routes these through the endpoint_logs branch.
tags: ["endpoint_logs", "winlogbeat"]

# Tenant attribution stamped at the edge (WS0.3). Set TENANT_ID per deployment
# (lowercase slug); every event carries [tenant][id] for per-tenant routing,
# access isolation, and response scoping. Defaults to "unassigned".
fields_under_root: true
fields:
  tenant:
    id: "${TENANT_ID:unassigned}"

# Ship to the SOC Logstash beats input. Override host via env if needed.
output.logstash:
  hosts: ["${LOGSTASH_HOST:localhost:5044}"]
  # WS3.1 (audit P2-2): Logstash's Beats input (:5044) is TLS-only, so plaintext
  # output fails the handshake. Verify the CA-signed Logstash cert against the stack
  # CA — ship ca.crt to the endpoint and point WINLOGBEAT_CA at it.
  ssl.enabled: true
  ssl.certificate_authorities: ["${WINLOGBEAT_CA:C:/ProgramData/winlogbeat/certs/ca.crt}"]
  ssl.verification_mode: "${WINLOGBEAT_SSL_VERIFY:full}"

# Keep Winlogbeat's own logs local for troubleshooting.
logging.level: info
logging.to_files: true
logging.files:
  path: C:/ProgramData/winlogbeat/logs
  name: winlogbeat
  keepfiles: 7
  permissions: 0644
