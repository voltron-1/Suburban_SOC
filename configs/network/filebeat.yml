# ============================== Filebeat inputs ===============================
# Suburban-SOC Zeek Integration — authoritative config (matches SOP-002)
# Stack: ELK 9.3.2 | Input: Zeek JSON logs via filestream

filebeat.inputs:
  - type: filestream
    id: zeek-logs
    enabled: true
    paths:
      - /storage/PCAP/zeek_logs/*.log
    parsers:
      - ndjson:
          target: ""
          overwrite_keys: true
          add_error_key: true
    # Zeek detection logs are tiny and volatile: a single Scan::Port_Scan in
    # notice.log is ~336 B, and the live capture stream rewrites it in place with
    # the SAME size on every restart. Two failure modes to avoid:
    #   * fingerprint default length (1024 B) skips files smaller than that, so
    #     detection logs never ship while bulky conn/dns/ssl logs do;
    #   * native (inode/offset) identity is content-blind — a same-size rewrite
    #     leaves the offset at EOF, so the NEW notice is silently never re-read.
    # Use fingerprint identity with the 64 B floor: it hashes the first 64 bytes,
    # so it both harvests small files (>=64 B) AND detects content changes (a
    # different notice => different fingerprint => re-read from 0 => ships), which
    # native cannot. Changing file_identity invalidates the registry — deploy with
    # `systemctl stop filebeat && rm -rf /var/lib/filebeat/registry && start`.
    prospector.scanner.fingerprint.enabled: true
    prospector.scanner.fingerprint.length: 64
    file_identity.fingerprint: ~

# ============================== Tenant attribution ===========================
# Edge-stamping (WS0.3): each deployment sets TENANT_ID so every shipped event
# carries [tenant][id]. Storage routing, ES role isolation, and tenant-scoped
# response all key on this. Use a lowercase slug (e.g. "home-smith"); defaults
# to "unassigned" so events are never dropped, just clearly unattributed.
fields_under_root: true
fields:
  tenant:
    id: "${TENANT_ID:unassigned}"

# ============================== Logstash Output ===============================
output.logstash:
  # LOGSTASH_HOST env var allows team members to change target without editing this file.
  # Default: localhost:5044 (works for Docker stack on same host)
  hosts: ["${LOGSTASH_HOST:localhost:5044}"]
  # WS3.1: encrypt telemetry in transit. Logstash's Beats input serves a CA-signed
  # cert; verify it against the stack CA. Ship the CA to the endpoint and point
  # FILEBEAT_CA at it (default path matches the agent-deploy bundle).
  ssl.enabled: true
  ssl.certificate_authorities: ["${FILEBEAT_CA:/etc/filebeat/certs/ca.crt}"]
  ssl.verification_mode: "${FILEBEAT_SSL_VERIFY:full}"
  # WS3.1 mTLS: Logstash's Beats input requires client authentication
  # (ssl_certificate_authorities is set). Present this CA-signed client cert as
  # Filebeat's identity, or the server rejects the batch with "tls: certificate
  # required". Generated by the docker-compose `setup` service (filebeat cert).
  ssl.certificate: "${FILEBEAT_CERT:/etc/filebeat/certs/filebeat.crt}"
  ssl.key: "${FILEBEAT_KEY:/etc/filebeat/certs/filebeat.key}"
