input {
  # Standard Beats input for endpoint logs (Winlogbeat / Sysmon / Filebeat)
  beats {
    port => 5044
    tags => ["endpoint_logs"]
  }
  
  # Network tap input (Zeek / Suricata / Syslog)
  http {
    port => 5514
    tags => ["network_logs"]
  }
}

filter {
  # --- Category 0: Zeek logs shipped by Filebeat from /storage/PCAP/zeek_logs ---
  # Filebeat's ndjson parser already expanded each line into top-level fields, so
  # Zeek's native keys (id, source, ts, note, auth_success, mime_type) arrive as-is.
  # These come in tagged "endpoint_logs" (Beats input :5044), NOT "network_logs",
  # so they would otherwise skip all parsing. Here we (a) stamp event.dataset from
  # the source filename (conn.log -> zeek.conn) — the field the verifier and
  # dashboards key on — and (b) tag them "zeek" so the output routes them to a
  # dedicated zeek-* index. Zeek's nested `id` object and string `source` field
  # collide with the ECS mappings in logstash-security-* (HTTP 400) otherwise.
  if [log][file][path] =~ "zeek_logs" {
    grok {
      match => { "[log][file][path]" => "/(?<zeek_stream>[a-z0-9_]+)\.log$" }
      tag_on_failure => ["_zeek_path_nomatch"]
    }
    if [zeek_stream] {
      mutate {
        add_field    => { "[event][dataset]" => "zeek.%{zeek_stream}" }
        add_tag      => ["zeek"]
        remove_field => ["zeek_stream"]
      }
    }
  }

  # --- Category 1: Network & Application Telemetry ---
  if "network_logs" in [tags] {
    # Parse standard Zeek/Suricata JSON outputs if applicable
    json {
      source => "message"
      target => "network_parsed"
    }
    
    # Map raw fields to ECS Network & Application fields + Zeek IPs
    mutate {
      rename => {
        "[network_parsed][id.orig_h]"   => "source.ip"
        "[network_parsed][id.resp_h]"   => "destination.ip"
        "[network_parsed][id.orig_p]"   => "source.port"
        "[network_parsed][id.resp_p]"   => "destination.port"
        "[network_parsed][proto]"       => "network.protocol"
        "[network_parsed][service]"     => "network.transport"
        "[network_parsed][query]"       => "dns.question.name"
        "[network_parsed][qtype_name]"  => "dns.question.type"
        "[network_parsed][rcode_name]"  => "dns.response.code"
        "[network_parsed][method]"      => "http.request.method"
        "[network_parsed][status_code]" => "http.response.status_code"
        # Phase A: SOAR MAC enrichment — maps Zeek conn MAC fields to ECS
        # Requires @load policy/protocols/conn/mac-logging in local.zeek
        "[network_parsed][orig_l2_addr]" => "source.mac"
        "[network_parsed][resp_l2_addr]" => "destination.mac"
        # Component 2: SSL/TLS telemetry from Zeek ssl.log (Network Dashboard)
        # Requires @load base/protocols/ssl in local.zeek
        "[network_parsed][server_name]"       => "tls.client.server_name"
        "[network_parsed][cipher]"            => "tls.cipher"
        "[network_parsed][curve]"             => "tls.curve"
        "[network_parsed][version]"           => "tls.version"
        "[network_parsed][validation_status]" => "tls.validation_status"
        # Component 1: surface Zeek notice/ssh fields for MITRE/NIST tagging
        "[network_parsed][note]"         => "note"
        "[network_parsed][auth_success]" => "auth_success"
      }
    }

    # GeoIP Enrichment for Kibana Dashboards
    if [source][ip] {
      geoip {
        source => "[source][ip]"
        target => "[source][geo]"
      }
    }
    if [destination][ip] {
      geoip {
        source => "[destination][ip]"
        target => "[destination][geo]"
      }
    }
  }

  # --- Category 2: Host, Process, & Identity Telemetry ---
  if "endpoint_logs" in [tags] {
    # If processing Windows Sysmon Events via Winlogbeat
    if [winlog][channel] == "Microsoft-Windows-Sysmon/Operational" {
      mutate {
        rename => {
          "[winlog][event_data][Image]"           => "process.executable"
          "[winlog][event_data][CommandLine]"     => "process.args"
          "[winlog][event_data][ParentImage]"     => "process.parent.name"
          "[winlog][event_data][User]"            => "user.name"
          "[winlog][event_data][TargetUserName]"  => "user.target.name"
          "[winlog][event_data][TargetFilename]"  => "file.path"
          "[winlog][event_data][Hashes]"          => "file.hash.sha256"
        }
      }
      # Component 3: tag Sigma-matched detections for the Endpoint dashboard
      if [process][executable] =~ "(?i)\\rundll32\.exe" and [process][args] =~ "(?i)comsvcs" {
        mutate { add_tag => ["sigma_lsass_dump", "CRITICAL_THREAT"] }
      }
      if [process][executable] =~ "(?i)\\wevtutil\.exe" and [process][args] =~ "(?i)(cl|clear-log)" {
        mutate { add_tag => ["sigma_event_log_clear"] }
      }
      if [process][executable] =~ "(?i)powershell" and [process][args] =~ "(?i)-enc" {
        mutate { add_tag => ["sigma_powershell_encoded"] }
      }
    }

    # Component 3: Windows Security events (4624/4625 login tracking)
    if [winlog][channel] == "Security" {
      if [winlog][event_id] == 4625 {
        mutate { add_field => { "[event][outcome]" => "failure" } }
      }
      if [winlog][event_id] == 4624 {
        mutate { add_field => { "[event][outcome]" => "success" } }
      }
    }

    # If processing Linux Auth Logs (/var/log/auth.log)
    if [log][file][path] =~ "auth.log" {
      grok {
        match => { "message" => "%{SYSLOGTIMESTAMP:timestamp} %{HOSTNAME:host.name} sshd\[%{POSINT:process.pid}\]: %{WORD:event.outcome} %{WORD:system.auth.method} for %{USER:user.name} from %{IP:source.ip} port %{POSINT:source.port}" }
      }
    }
  }

  # --- Category 3: Operational Metadata Enrichment ---
  mutate {
    add_field => {
      "[@metadata][pipeline]" => "security-enrichment"
      # Component 4: ingest timestamp for the Document Lag panel (Data Quality dash)
      "[event][created]" => "%{+yyyy-MM-dd'T'HH:mm:ss.SSSZ}"
    }
    # Ensure all field copies capture structural tracking metrics
    copy => {
      "[agent][name]" => "agent.hostname"
      "[log][file][path]" => "log.file.path"
    }
  }

  # Component 4: tag parse failures for the Data Quality dashboard
  if "_jsonparsefailure" in [tags] or "_grokparsefailure" in [tags] {
    mutate {
      add_field => { "[pipeline][error]" => "true" }
    }
  }

  # --- Category 4: Threat Detection & Alerting ---
  # Example rule: Tag known malicious IPs or critical events
  if [source.ip] == "185.150.115.115" or [destination.ip] == "185.150.115.115" {
    mutate {
      add_tag => ["CRITICAL_THREAT"]
    }
  }

  # --- Category 5: Framework Enrichment (Executive Dashboard) ---
  # Tag events with MITRE ATT&CK technique/tactic + NIST CSF function so the
  # Executive dashboard's MITRE heatmap and NIST donut can aggregate them.

  # Network: Zeek port-scan notice -> Discovery
  if [note] == "Scan::Port_Scan" {
    mutate {
      add_field => {
        "[threat][technique][id]"   => "T1046"
        "[threat][technique][name]" => "Network Service Discovery"
        "[threat][tactic][name]"    => "Discovery"
        "[nist][function]"          => "Detect"
      }
    }
  }

  # Network: Zeek SSH failed-auth (brute force) -> Credential Access
  # auth_success arrives as a boolean from Zeek JSON; =~ coerces to string.
  if [auth_success] =~ /(?i)false/ {
    mutate {
      add_field => {
        "[threat][technique][id]"   => "T1110"
        "[threat][technique][name]" => "Brute Force"
        "[threat][tactic][name]"    => "Credential Access"
        "[nist][function]"          => "Detect"
      }
    }
  }

  # Endpoint: encoded PowerShell (Sysmon) -> Execution
  if [process][executable] =~ "(?i)powershell" and [process][args] =~ "(?i)-enc" {
    mutate {
      add_field => {
        "[threat][technique][id]"   => "T1059.001"
        "[threat][technique][name]" => "PowerShell"
        "[threat][tactic][name]"    => "Execution"
        "[nist][function]"          => "Detect"
      }
    }
  }
}

output {
  # Zeek network telemetry -> dedicated zeek-* index. A fresh index lets Zeek's
  # native field shapes (nested `id`, string `source`) map cleanly via dynamic
  # mapping instead of colliding with the ECS mappings in logstash-security-*.
  if "zeek" in [tags] {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "zeek-%{+YYYY.MM.dd}"
      data_stream => false
    }
  } else {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "logstash-security-%{+YYYY.MM.dd}"
      data_stream => false
      # If your cluster requires credentials, uncomment below:
      # user => "elastic"
      # password => "YOUR_PASSWORD"
    }
  }

  # Push Notification Output (Conditional)
  if "CRITICAL_THREAT" in [tags] {
    http {
      url => "https://ntfy.sh/subsoc-alerts-92x8m"
      http_method => "post"
      format => "message"
      message => "🚨 CRITICAL ALERT: Malicious IP detected on your network! IP: %{source.ip}"
      headers => {
        "Title" => "Suburban-SOC Alert"
        "Priority" => "high"
        "Tags" => "warning,skull"
      }
    }
  }

  # SOAR trigger (Watcher-free replacement for rules/elastic_watcher/soar_quarantine_alert.json)
  # Fires the AI agent's /alert webhook at ingest time for high-confidence IOC hits,
  # instead of polling every 60s. Reaches the agent by its docker-compose service name
  # on soc-mesh-net. The /alert handler expects: severity, source_ip, source_mac, raw_log.
  if [event][dataset] == "zeek.conn" and [threat][indicator][domain] {
    http {
      url => "http://soc_ai_agent:5000/alert"
      http_method => "post"
      format => "json"
      mapping => {
        "severity"   => "critical"
        "source_ip"  => "%{[source][ip]}"
        "source_mac" => "%{[source][mac]}"
        "raw_log"    => "%{message}"
      }
    }
  }
}
