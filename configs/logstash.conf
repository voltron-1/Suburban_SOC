input {
  # Standard Beats input for endpoint logs (Winlogbeat / Sysmon / Filebeat)
  # WS3.1: TLS terminated here so Filebeat->Logstash telemetry is encrypted in
  # transit (no plaintext on :5044). Server cert is the dedicated logstash cert
  # signed by the stack CA (see setup); clients verify it against ca.crt.
  beats {
    port => 5044
    tags => ["endpoint_logs"]
    ssl_enabled => true
    ssl_certificate => "/usr/share/logstash/config/certs/logstash/logstash.crt"
    ssl_key => "/usr/share/logstash/config/certs/logstash/logstash.pkcs8.key"
    ssl_certificate_authorities => ["/usr/share/logstash/config/certs/ca/ca.crt"]
  }
  
  # Network tap input (Zeek / Suricata / Syslog).
  # SECURITY (audit P1-8): this input is PLAINTEXT and is intentionally NOT
  # published to the host — docker-compose maps only :5044 (Beats, TLS), so :5514 is
  # reachable only by peers on the internal `soc-mesh-net` bridge, never the LAN.
  # That is the only reason plaintext is acceptable here. To harden for a routed/
  # production deployment, terminate TLS on this input (ssl_enabled => true with the
  # logstash cert, as the :5044 beats input does) and switch every :5514 shipper to
  # https — do NOT expose :5514 to the host without TLS.
  http {
    port => 5514
    host => "0.0.0.0"   # mesh-internal only; not in compose `ports:` (see above)
    tags => ["network_logs"]
  }
}

filter {
  # --- WS0.3: tenant attribution ---
  # Every event must carry a tenant id. The beats shippers edge-stamp [tenant][id];
  # the :5514 http input and any unstamped source default to "unassigned" so data is
  # never dropped, just clearly unattributed. The id becomes part of the index name,
  # so force lowercase for Elasticsearch index-name validity.
  if ![tenant][id] {
    mutate { add_field => { "[tenant][id]" => "unassigned" } }
  }
  mutate { lowercase => ["[tenant][id]"] }

  # --- Category 0: Zeek logs shipped by Filebeat from /storage/PCAP/zeek_logs ---
  # Filebeat's ndjson parser already expanded each line into top-level fields, so
  # Zeek's native keys (id, source, ts, note, auth_success, mime_type) arrive as-is.
  # These come in tagged "endpoint_logs" (Beats input :5044), NOT "network_logs",
  # so they would otherwise skip all parsing. Here we (a) stamp event.dataset from
  # the source filename (conn.log -> zeek.conn) — the field the verifier and
  # dashboards key on — and (b) tag them "zeek" so the output routes them to a
  # dedicated zeek-* index. Zeek's nested `id` object and string `source` field
  # collide with the ECS mappings in logstash-security-* (HTTP 400) otherwise.
  if [log][file][path] =~ "zeek_logs" {
    grok {
      match => { "[log][file][path]" => "/(?<zeek_stream>[a-z0-9_]+)\.log$" }
      tag_on_failure => ["_zeek_path_nomatch"]
    }
    if [zeek_stream] {
      mutate {
        add_field    => { "[event][dataset]" => "zeek.%{zeek_stream}" }
        # WS1.4: event.module is the per-source dimension for the Data Quality
        # heartbeat panel (last-seen per source per tenant).
        add_field    => { "[event][module]" => "zeek" }
        add_tag      => ["zeek"]
        remove_field => ["zeek_stream"]
      }
    }

    # Zeek files.log/http.log use `source` as a plain string (e.g. "HTTP"); move
    # it aside so `source` can hold the ECS source.* object without a string-vs-
    # object mapping collision.
    if [source] {
      mutate { rename => { "[source]" => "[zeek][source]" } }
    }

    # Map Zeek-native connection fields (stored as literal dotted keys) to ECS so
    # the dashboards' panels populate. note/auth_success/mime_type are left intact
    # for the issue-#22 verifier.
    mutate {
      rename => {
        "[id.orig_h]"   => "[source][ip]"
        "[id.resp_h]"   => "[destination][ip]"
        "[id.orig_p]"   => "[source][port]"
        "[id.resp_p]"   => "[destination][port]"
        "[proto]"       => "[network][transport]"
        "[service]"     => "[network][protocol]"
        "[query]"       => "[dns][question][name]"
        "[method]"      => "[http][request][method]"
        "[status_code]" => "[http][response][status_code]"
      }
    }
    # WS2.4: skip GeoIP for RFC1918 / loopback / link-local / ULA — internal IPs never
    # resolve, so the lookup is pure per-event overhead on internal conn telemetry.
    if [source][ip] and [source][ip] !~ /^(10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[01])\.|127\.|169\.254\.|::1|fe80:|fc|fd)/ {
      geoip { source => "[source][ip]" target => "[source]" }
    }
    if [destination][ip] and [destination][ip] !~ /^(10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[01])\.|127\.|169\.254\.|::1|fe80:|fc|fd)/ {
      geoip { source => "[destination][ip]" target => "[destination]" }
    }

    # WS2.4 (parse-drop fix): Zeek software.log emits a structured `version` record as
    # literal dotted keys (version.major/minor/addl). logstash-security-* maps `version`
    # as keyword, so the implied object collides -> document_parsing_exception (HTTP 400,
    # event dropped). Keep the human-readable string in ECS package.version and drop the
    # dotted numerics so nothing named version.* reaches ES.
    if [event][dataset] == "zeek.software" {
      if [unparsed_version] { mutate { rename => { "[unparsed_version]" => "[package][version]" } } }
      mutate {
        # Cover both shapes the Filebeat ndjson codec can deliver: literal dotted
        # string keys ("version.major") and a proper nested object (version.major).
        # The bare "[version]" removal alone resolves the collision; the rest make it
        # unambiguous regardless of codec behavior. remove_field on an absent key is a
        # no-op, so listing both forms is safe.
        remove_field => [
          "[version.major]", "[version.minor]", "[version.minor2]", "[version.minor3]", "[version.addl]",
          "[version][major]", "[version][minor]", "[version][minor2]", "[version][minor3]", "[version][addl]",
          "[version]"
        ]
      }
    }

    # --- #160: ECS-normalize zeek.ssl TLS fields (SNI + Cipher dashboard panels) ---
    # zeek.ssl arrives via Filebeat (tagged endpoint_logs) and is handled HERE in
    # Category 0 — NOT the network_logs branch below, which already maps these but
    # which real Filebeat-shipped Zeek data never reaches. Filebeat's ndjson codec
    # delivers server_name/cipher/curve/version/validation_status as top-level keys;
    # rename to ECS tls.* so the Network dashboard "SNI / Server Name (TLS)" and
    # "Cipher Suite Audit" panels (which query tls.client.server_name / tls.cipher)
    # populate. Scoped to zeek.ssl so the generic `version` key can't collide with
    # the zeek.software version handling above.
    if [event][dataset] == "zeek.ssl" {
      mutate {
        rename => {
          "[server_name]"       => "[tls][client][server_name]"
          "[cipher]"            => "[tls][cipher]"
          "[curve]"             => "[tls][curve]"
          "[version]"           => "[tls][version]"
          "[validation_status]" => "[tls][validation_status]"
        }
      }
    }

    # --- WS1.1: Zeek Intel framework hits (intel.log) -> ECS threat.indicator.* ---
    # The Intel framework (configs/intel/) matches live-feed indicators (WS1.3) against
    # connections and writes intel.log. Mapping the hit to ECS is what makes the SOAR
    # trigger fire on a REAL match — it replaces the dead `[threat][indicator][domain]`
    # condition (nothing ever set that field). Zeek JSON emits literal dotted keys.
    if [event][dataset] == "zeek.intel" {
      mutate {
        rename => {
          "[seen.indicator]"      => "[threat][indicator][value]"
          "[seen.indicator_type]" => "[threat][indicator][type]"
          "[seen.where]"          => "[threat][indicator][sighting]"
          "[sources]"             => "[threat][feed][name]"
        }
        add_tag => ["intel_match", "CRITICAL_THREAT"]
      }
      # Route the indicator value into the typed ECS field so detections/dashboards
      # can key on threat.indicator.ip / threat.indicator.domain.
      if [threat][indicator][type] == "Intel::ADDR" {
        mutate { add_field => { "[threat][indicator][ip]" => "%{[threat][indicator][value]}" } }
      } else if [threat][indicator][type] == "Intel::DOMAIN" {
        mutate { add_field => { "[threat][indicator][domain]" => "%{[threat][indicator][value]}" } }
      }
      # #177: the ntfy push output (below, in the output{} block) is a public
      # third-party relay — mask the source IP in that notification's text by
      # default (last octet -> .0), computed into [@metadata] so the indexed
      # [source][ip] field itself is never touched. NOTIFY_INCLUDE_RAW_IOCS=true
      # (same flag name/shape as the AI agent's) restores the unmasked IP.
      if [source][ip] {
        mutate { add_field => { "[@metadata][notify_source_ip]" => "%{[source][ip]}" } }
        if "${NOTIFY_INCLUDE_RAW_IOCS:false}" != "true" {
          mutate { gsub => [ "[@metadata][notify_source_ip]", "\.\d+$", ".0" ] }
          # gsub only matches a trailing IPv4 octet, so an IPv6 address (no dotted
          # tail) would otherwise pass through this untouched and reach the ntfy
          # output below fully unmasked (audit #177). Fail safe: anything still
          # containing a colon after the IPv4 attempt gets a fixed placeholder.
          if [@metadata][notify_source_ip] =~ ":" {
            mutate { replace => { "[@metadata][notify_source_ip]" => "[masked-ipv6]" } }
          }
        }
      }
      # The :5514 HTTP input enriches every request with transport metadata
      # (user_agent/http/url + the posting client's host.ip). None of these belong to a
      # Zeek intel record, and `user_agent` arrives as an ECS object which collides with
      # the strict keyword mapping -> document_parsing_exception (HTTP 400, event dropped
      # silently). Gate the strip on [user_agent] so it only touches the :5514 HTTP-input
      # path: Filebeat-shipped intel.log (:5044) carries none of these, and we must keep
      # its host.ip sensor provenance intact for multi-sensor correlation.
      if [user_agent] {
        mutate { remove_field => ["[user_agent]", "[http]", "[url]", "[host][ip]"] }
      }
    }
  }

  # --- Category 1: Network & Application Telemetry ---
  if "network_logs" in [tags] {
    # Parse standard Zeek/Suricata JSON outputs if applicable
    json {
      source => "message"
      target => "network_parsed"
    }
    
    # Map raw fields to ECS Network & Application fields + Zeek IPs.
    # NOTE: targets MUST use Logstash bracket notation ([source][ip]) — a dotted
    # string target ("source.ip") creates a *flat* field literally named
    # "source.ip", which the GeoIP conditional below (`if [source][ip]`) never
    # matches, so GeoIP silently never ran. ECS transport/protocol also follow
    # Zeek semantics (matching the Beats/Zeek branch above): Zeek `proto` is the
    # L4 transport (tcp/udp/icmp) and `service` is the application protocol
    # (dns/http/ssl) — these were previously swapped.
    mutate {
      rename => {
        "[network_parsed][id.orig_h]"   => "[source][ip]"
        "[network_parsed][id.resp_h]"   => "[destination][ip]"
        "[network_parsed][id.orig_p]"   => "[source][port]"
        "[network_parsed][id.resp_p]"   => "[destination][port]"
        "[network_parsed][proto]"       => "[network][transport]"
        "[network_parsed][service]"     => "[network][protocol]"
        "[network_parsed][query]"       => "[dns][question][name]"
        "[network_parsed][qtype_name]"  => "[dns][question][type]"
        "[network_parsed][rcode_name]"  => "[dns][response][code]"
        "[network_parsed][method]"      => "[http][request][method]"
        "[network_parsed][status_code]" => "[http][response][status_code]"
        # Phase A: SOAR MAC enrichment — maps Zeek conn MAC fields to ECS
        # Requires @load policy/protocols/conn/mac-logging in local.zeek
        "[network_parsed][orig_l2_addr]" => "[source][mac]"
        "[network_parsed][resp_l2_addr]" => "[destination][mac]"
        # Component 2: SSL/TLS telemetry from Zeek ssl.log (Network Dashboard)
        # Requires @load base/protocols/ssl in local.zeek
        "[network_parsed][server_name]"       => "[tls][client][server_name]"
        "[network_parsed][cipher]"            => "[tls][cipher]"
        "[network_parsed][curve]"             => "[tls][curve]"
        "[network_parsed][version]"           => "[tls][version]"
        "[network_parsed][validation_status]" => "[tls][validation_status]"
        # Component 1: surface Zeek notice/ssh fields for MITRE/NIST tagging
        "[network_parsed][note]"         => "note"
        "[network_parsed][auth_success]" => "auth_success"
      }
    }

    # GeoIP Enrichment for Kibana Dashboards
    if [source][ip] {
      geoip {
        source => "[source][ip]"
        target => "[source]"
      }
    }
    if [destination][ip] {
      geoip {
        source => "[destination][ip]"
        target => "[destination]"
      }
    }
  }

  # --- Category 2: Host, Process, & Identity Telemetry ---
  if "endpoint_logs" in [tags] {
    # WS1.4: per-source dimension for the Data Quality heartbeat (last-seen per
    # source per tenant). Windows (Winlogbeat) vs Linux auth (Filebeat).
    if [winlog] {
      mutate { add_field => { "[event][module]" => "windows" } }
    } else if [log][file][path] =~ "auth.log" {
      mutate { add_field => { "[event][module]" => "system" } }
    }
    # If processing Windows Sysmon Events via Winlogbeat
    if [winlog][channel] == "Microsoft-Windows-Sysmon/Operational" {
      mutate {
        rename => {
          "[winlog][event_data][Image]"           => "process.executable"
          "[winlog][event_data][CommandLine]"     => "process.args"
          "[winlog][event_data][ParentImage]"     => "process.parent.name"
          "[winlog][event_data][User]"            => "user.name"
          "[winlog][event_data][TargetUserName]"  => "user.target.name"
          "[winlog][event_data][TargetFilename]"  => "file.path"
          "[winlog][event_data][Hashes]"          => "file.hash.sha256"
        }
      }
      # ----------------------------------------------------------------------
      # WS1.2: Sigma detection logic is NO LONGER inlined here. The 10 rules in
      # rules/sigma/*.yml are the single source of truth, deployed to the Elastic
      # Detection Engine by scripts/setup/deploy_detections.sh (pySigma). They run
      # against logstash-* and raise alerts in Security → Alerts, with native MITRE
      # ATT&CK coverage. This block now only normalizes Sysmon fields to ECS above;
      # detection + ATT&CK/NIST classification live in the rules, not the pipeline.
      # ----------------------------------------------------------------------
    }

    # Component 3: Windows Security events (4624/4625 login tracking)
    if [winlog][channel] == "Security" {
      if [winlog][event_id] == 4625 {
        mutate { add_field => { "[event][outcome]" => "failure" } }
      }
      if [winlog][event_id] == 4624 {
        mutate { add_field => { "[event][outcome]" => "success" } }
      }
    }

    # If processing Linux Auth Logs (/var/log/auth.log)
    # Cheap literal pre-filter: auth.log is dominated by sudo/cron/systemd/PAM
    # lines that can never match the sshd grok. Gating on "sshd[" keeps those
    # tens-of-thousands of lines out of the grok engine entirely (ingest-lag
    # hygiene) and shrinks the attacker-controlled-input surface for backtracking.
    if [log][file][path] =~ "auth.log" and "sshd[" in [message] {
      # #161: capture into ECS BRACKET notation ([source][ip], not the dotted
      # "source.ip"). The dotted form creates a *flat* key that the geoip
      # conditional below (`if [source][ip]`) never matches — the exact trap the
      # network_logs NOTE documents, and why source geoip silently never ran for
      # SSH sources. `(?:invalid user )?` also captures brute-force attempts
      # against non-existent accounts (the bulk of attacker traffic), which the
      # old pattern dropped entirely.
      #
      # SECURITY (grok anchoring): the username is ATTACKER-CONTROLLED and is
      # echoed BEFORE the client IP that sshd appends. A non-greedy, unanchored
      # capture lets `user=victim from 8.8.8.8 port 22` bind [source][ip] to the
      # injected IP and drop the real one (source-IP/country spoof, geoip-guard
      # evasion, HUNT-002 poisoning). So the pattern is fully anchored (^…$) and
      # the username is GREEDY: the trailing, sshd-supplied `from <ip> port <n>`
      # is always the LAST match and therefore always wins. NOTSPACE (not WORD)
      # for the auth method covers `keyboard-interactive/pam`. timeout_millis
      # bounds worst-case backtracking on adversarial input.
      grok {
        match => { "message" => "^%{SYSLOGTIMESTAMP:timestamp} %{HOSTNAME:[host][name]} sshd\[%{POSINT:[process][pid]}\]: %{WORD:[event][outcome]} %{NOTSPACE:[system][auth][method]} for (?:invalid user )?%{GREEDYDATA:[user][name]} from %{IP:[source][ip]} port %{POSINT:[source][port]}(?:\s+ssh2)?\s*$" }
        timeout_millis => 1000
      }
      # Normalize the sshd auth verb to ECS event.outcome. Raw logs emit
      # "Failed password ..." / "Accepted publickey ..." -> grok captures
      # "Failed"/"Accepted"; the Endpoint dashboard panels query
      # event.outcome:failure, so without this the SSH panels never match.
      if [event][outcome] =~ /(?i)^fail/ {
        mutate { replace => { "[event][outcome]" => "failure" } }
      } else if [event][outcome] =~ /(?i)^accept/ {
        mutate { replace => { "[event][outcome]" => "success" } }
      }
      # #161: geoip-enrich the SSH client (attacker) source IP so the Endpoint
      # dashboard "Failed SSH by Country" panel (buckets on
      # source.geo.country_name) populates. Inbound brute-force sources only get
      # source.geo here — the zeek/network geoip filters never touch auth.log.
      # Guard RFC1918/loopback/link-local/ULA — internal IPs never resolve (same
      # guard as the Category 0 zeek branch).
      if [source][ip] and [source][ip] !~ /^(10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[01])\.|127\.|169\.254\.|::1|fe80:|fc|fd)/ {
        geoip { source => "[source][ip]" target => "[source]" }
      }
    }
  }

  # --- Category 3: Operational Metadata Enrichment ---
  # Component 4 (audit P2-4): ingest timestamp for the Document Lag panel, pinned to
  # UTC so it matches @timestamp regardless of the JVM/host timezone. The previous
  # sprintf %{+...} form rendered in JVM-local TZ, skewing the document-lag math.
  ruby { code => "event.set('[event][created]', Time.now.utc.strftime('%Y-%m-%dT%H:%M:%S.%LZ'))" }
  mutate {
    add_field => {
      "[@metadata][pipeline]" => "security-enrichment"
    }
    # Ensure all field copies capture structural tracking metrics
    copy => {
      "[agent][name]" => "agent.hostname"
      "[log][file][path]" => "log.file.path"
    }
  }

  # Component 4: tag parse failures for the Data Quality dashboard
  if "_jsonparsefailure" in [tags] or "_grokparsefailure" in [tags] {
    mutate {
      add_field => { "[pipeline][error]" => "true" }
    }
  }

  # --- Category 3.5: WS3.4 PII minimization (data minimization at ingest) ---
  # SOC 2 Privacy / data-handling: keep only what detection & response need. Strip
  # high-risk payload/secret fields that carry user content or credentials but add
  # nothing to security analytics. Dropping them at ingest means they never land in
  # Elasticsearch, snapshots, or the right-to-erasure surface. See SOP-012.
  mutate {
    remove_field => [
      "[http][request][body][content]",   # request payloads (form data, uploads)
      "[http][response][body][content]",   # response payloads
      "[http][request][headers][cookie]",  # session cookies
      "[http][request][headers][authorization]", # bearer/basic creds
      "[http][request][headers][set-cookie]",
      "[url][password]", "[url][username]", # credentials embedded in URLs
      "[user][password]", "[user][full_name]", "[user][email]" # not needed for detection
    ]
  }
  # Redact obvious secrets left inline in the raw message (password=, token=, api_key=)
  # and in the grok-extracted [user][name]. Attacker-controlled "invalid user"
  # strings from SSH brute force (#161) are copied into user.name before this stage,
  # so the message-only gsub used to leave a pasted credential (e.g. login as
  # `password=hunter2`) verbatim in user.name — persisted to ES/snapshots past the
  # right-to-erasure surface (SOP-012). Redact both. Keeps the event for analytics.
  if [message] or [user][name] {
    mutate {
      gsub => [
        "message", "(?i)(password|passwd|pwd|token|api[_-]?key|secret|authorization)\s*[=:]\s*\S+", "\1=[REDACTED]",
        "[user][name]", "(?i)(password|passwd|pwd|token|api[_-]?key|secret|authorization)\s*[=:]\s*\S+", "\1=[REDACTED]"
      ]
    }
  }

  # --- Category 4: Threat Detection & Alerting ---
  # WS1.1: the hardcoded demo IOC (185.150.115.115) is GONE. Threat detection is now
  # driven by the live intel feed (WS1.3) via the Zeek Intel framework — see the
  # `zeek.intel` block above, which tags real matches CRITICAL_THREAT + intel_match.

  # --- Category 5: Framework Enrichment (MITRE ATT&CK + NIST CSF) ------------
  # Classify NETWORK (Zeek) detections with ECS threat.* + NIST CSF function so the
  # Executive dashboard's MITRE heatmap / NIST donut aggregate correctly.
  # WS1.2: ENDPOINT (Sigma) ATT&CK classification is no longer done here — those
  # detections are Elastic Detection Engine rules now, carrying their own MITRE
  # threat mapping; coverage shows in Security → Alerts / MITRE ATT&CK coverage and
  # the WS1.5 matrix. Only the Zeek scan/brute detections remain pipeline-classified.

  # -- Network detections (Zeek) --
  # T1046 — Zeek port-scan notice -> Discovery
  if [note] == "Scan::Port_Scan" {
    mutate { add_field => {
      "[threat][technique][id]"   => "T1046"
      "[threat][technique][name]" => "Network Service Discovery"
      "[threat][tactic][id]"      => "TA0007"
      "[threat][tactic][name]"    => "Discovery"
      "[threat][framework]"       => "MITRE ATT&CK"
      "[nist][function]"          => "Detect"
    } }
  }
  # T1110 — Zeek SSH failed-auth (brute force) -> Credential Access.
  # auth_success arrives as a boolean from Zeek JSON; =~ coerces to string.
  if [auth_success] =~ /(?i)false/ {
    mutate { add_field => {
      "[threat][technique][id]"   => "T1110"
      "[threat][technique][name]" => "Brute Force"
      "[threat][tactic][id]"      => "TA0006"
      "[threat][tactic][name]"    => "Credential Access"
      "[threat][framework]"       => "MITRE ATT&CK"
      "[nist][function]"          => "Detect"
    } }
  }

  # -- Endpoint detections: see WS1.2 note above. Their ATT&CK/NIST mapping now
  #    lives in the Sigma rules (rules/sigma/*.yml) -> Elastic Detection Engine. --

  # --- Category 6: SOAR webhook signing (WS0.2) ---
  # The AI agent's /alert endpoint now requires an HMAC-SHA256 signature over the
  # exact request body. Build the body here and sign it so the bytes we sign are
  # the bytes the http output sends. Only structured, validated fields (IP/MAC) go
  # in the body — no free text that could perturb sprintf in the output stage.
  # WS1.1: fire on a real Zeek Intel match (threat.indicator.value set by the
  # zeek.intel block) instead of the never-set zeek.conn + threat.indicator.domain.
  if [event][dataset] == "zeek.intel" and [threat][indicator][value] {
    ruby {
      init => 'require "openssl"; require "json"'
      code => '
        secret = ENV["SOC_AGENT_HMAC_SECRET"].to_s
        body = {
          "severity"   => "critical",
          "tenant_id"  => event.get("[tenant][id]").to_s,
          "source_ip"  => event.get("[source][ip]").to_s,
          "source_mac" => event.get("[source][mac]").to_s
        }.to_json
        # audit P1-1: replay protection. Sign "<timestamp>." + body and send the
        # timestamp in x-elastic-timestamp; the agent rejects stale/replayed signatures.
        ts = Time.now.to_i.to_s
        sig = "sha256=" + OpenSSL::HMAC.hexdigest("SHA256", secret, ts + "." + body)
        event.set("[@metadata][soar_body]", body)
        event.set("[@metadata][soar_ts]", ts)
        event.set("[@metadata][soar_sig]", sig)
      '
    }
  }
}

output {
  # Unified security index. Zeek events are ECS-enriched in the filter above
  # (id.orig_h -> source.ip, etc.) and the colliding raw `id`/`source` fields are
  # gone, so they index here cleanly alongside endpoint telemetry — giving the
  # dashboards a single ECS data view with both network and host data.
  #
  # audit #169 / NIST SC-24: an event tagged _grokparsefailure/_jsonparsefailure
  # (the [pipeline][error] tag set above) is routed to a SEPARATE quarantine
  # index instead of the main data stream, so malformed input no longer
  # silently pollutes the primary security data. logstash-security-quarantine-*
  # matches the existing logstash-security-* template (same ECS mappings, same
  # ILM policy, same logstash_writer role grant) — no new template/role needed.
  if [pipeline][error] == "true" {
    elasticsearch {
      hosts    => ["${ELASTIC_HOSTS:https://elasticsearch:9200}"]
      index    => "logstash-security-quarantine-%{[tenant][id]}"
      action   => "create"
      data_stream => false
      user     => "${LOGSTASH_ES_USER}"
      password => "${LOGSTASH_ES_PASS}"
      ssl_enabled => true
      ssl_certificate_authorities => "/usr/share/logstash/config/certs/ca/ca.crt"
    }
  } else {
    elasticsearch {
      # HTTPS + authenticated. Credentials come from the least-privilege
      # `logstash_internal` user (role: logstash_writer), injected as env vars by
      # docker-compose.yml — never the `elastic` superuser, never hardcoded.
      hosts    => ["${ELASTIC_HOSTS:https://elasticsearch:9200}"]
      # Per-tenant data stream (WS0.3 + WS0.5): isolation is enforced by ES roles
      # scoped to the data stream name logstash-security-<tenant>. Still matches the
      # logstash-* data view, so dashboards keep working. provision_tenant.sh creates
      # the per-tenant role.
      #
      # WS0.5: the date suffix is gone — time is now managed by ILM rollover on the
      # data stream, not by daily index names. `action => create` is required because
      # data streams only accept op_type=create; ES auto-creates the stream from the
      # priority-200 data_stream template (logstash-security-template) on first write.
      index    => "logstash-security-%{[tenant][id]}"
      action   => "create"
      data_stream => false
      user     => "${LOGSTASH_ES_USER}"
      password => "${LOGSTASH_ES_PASS}"
      ssl_enabled => true
      ssl_certificate_authorities => "/usr/share/logstash/config/certs/ca/ca.crt"
    }
  }

  # Push Notification Output (Conditional)
  # WS1.1: ntfy topic is no longer hardcoded — it comes from the NTFY_TOPIC env
  # (set per deployment in .env, passed by docker-compose), with a safe default.
  if "CRITICAL_THREAT" in [tags] {
    http {
      url => "https://ntfy.sh/${NTFY_TOPIC:subsoc-alerts}"
      http_method => "post"
      format => "message"
      message => "🚨 CRITICAL: intel match on %{[threat][indicator][value]} (tenant=%{[tenant][id]}, src=%{[@metadata][notify_source_ip]})"
      headers => {
        "Title" => "Suburban-SOC Alert"
        "Priority" => "high"
        "Tags" => "warning,skull"
      }
    }
  }

  # SOAR trigger (Watcher-free replacement for rules/elastic_watcher/soar_quarantine_alert.json)
  # Fires the AI agent's /alert webhook at ingest time for high-confidence IOC hits,
  # instead of polling every 60s. Reaches the agent by its docker-compose service name
  # on soc-mesh-net. The /alert handler expects: severity, source_ip, source_mac, raw_log.
  # WS1.1: fire on a real Zeek Intel match (same condition as the signing block).
  if [event][dataset] == "zeek.intel" and [threat][indicator][value] {
    http {
      url => "http://soc_ai_agent:5000/alert"
      http_method => "post"
      # Send the exact pre-signed body built in the filter stage, with the HMAC in
      # the x-elastic-signature header and the freshness timestamp in
      # x-elastic-timestamp — both verified by the agent (WS0.2 + audit P1-1).
      format => "message"
      message => "%{[@metadata][soar_body]}"
      content_type => "application/json"
      headers => {
        "x-elastic-signature" => "%{[@metadata][soar_sig]}"
        "x-elastic-timestamp" => "%{[@metadata][soar_ts]}"
      }
    }
  }
}
