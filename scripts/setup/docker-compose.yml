# =============================================================================
# Suburban-SOC — secured ELK + AI-agent stack (WS0.1)
#
# Security model:
#   * xpack.security ENABLED with TLS on the Elasticsearch HTTP + transport layers.
#   * A one-shot `setup` service generates a CA + node cert into the `certs` volume,
#     sets the kibana_system password, and provisions a least-privilege
#     `logstash_internal` user (role: logstash_writer) — Logstash never uses the
#     `elastic` superuser.
#   * All secrets come from scripts/setup/.env (see .env.example). Nothing is
#     hardcoded; passwords are required (the setup container refuses to run without
#     them).
#
# First run:
#   cp .env.example .env   # then edit and set strong passwords + a 32-char key
#   docker compose up -d
# =============================================================================

# =============================================================================
# Transport security is ON (CDP §6): Elasticsearch requires authentication, serves
# HTTPS, and the transport layer uses verification_mode=certificate (mTLS) so only
# CA-signed peers join. The one-shot `setup` service auto-generates the CA + node
# certs into the shared `certs` volume on first run — no manual cert step is needed
# and all services (ES, Kibana, Logstash, agent) read that same volume. (The
# standalone generate_certs.sh is an unused alternative; the setup service is the
# single source of truth for certs.)
# =============================================================================

# Explicit Compose project name so this stack never collides with another repo
# whose compose also lives in a scripts/setup/ directory (Docker otherwise derives
# the project name "setup" from the folder, cross-wiring the two stacks).
name: suburban-soc

services:
  # --- One-shot: generate certs, set passwords, provision least-priv users -----
  setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION:-9.3.2}
    container_name: soc_setup
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
      # WS0.5: setup (root) also owns the snapshots volume so it can hand the fs
      # repo path to the elasticsearch process (uid 1000) — see chown below.
      - suburban_soc_snapshots:/usr/share/elasticsearch/snapshots
    user: "0"
    networks:
      - soc-mesh-net
    command: >
      bash -c '
        if [ x${ELASTIC_PASSWORD} == x ]; then echo "ERROR: set ELASTIC_PASSWORD in .env"; exit 1; fi;
        if [ x${KIBANA_PASSWORD} == x ]; then echo "ERROR: set KIBANA_PASSWORD in .env"; exit 1; fi;
        if [ x${LOGSTASH_PASSWORD} == x ]; then echo "ERROR: set LOGSTASH_PASSWORD in .env"; exit 1; fi;
        if [ ! -f config/certs/ca.zip ]; then
          echo "Creating CA";
          bin/elasticsearch-certutil ca --silent --pem -out config/certs/ca.zip;
          unzip config/certs/ca.zip -d config/certs;
        fi;
        if [ ! -f config/certs/certs.zip ]; then
          echo "Creating node certs";
          printf "instances:\n  - name: elasticsearch\n    dns:\n      - elasticsearch\n      - localhost\n    ip:\n      - 127.0.0.1\n" > config/certs/instances.yml;
          bin/elasticsearch-certutil cert --silent --pem -out config/certs/certs.zip --in config/certs/instances.yml --ca-cert config/certs/ca/ca.crt --ca-key config/certs/ca/ca.key;
          unzip config/certs/certs.zip -d config/certs;
        fi;
        # WS3.1: dedicated logstash server cert (CA-signed PEM) so the Beats input
        # (:5044) can serve TLS — Filebeat->Logstash is otherwise plaintext. Generated
        # here, BEFORE the find-chmod below strips +x from certutil. certutil emits a
        # PKCS1 key; the cert_pkcs8 one-shot service converts it (the Beats SSL input
        # requires PKCS8, and this image has no openssl).
        if [ ! -f config/certs/logstash/logstash.crt ]; then
          echo "Creating logstash cert (WS3.1 Beats TLS)";
          printf "instances:\n  - name: logstash\n    dns:\n      - logstash\n      - localhost\n" > config/certs/ls-instances.yml;
          bin/elasticsearch-certutil cert --silent --pem -out config/certs/ls.zip --in config/certs/ls-instances.yml --ca-cert config/certs/ca/ca.crt --ca-key config/certs/ca/ca.key;
          unzip config/certs/ls.zip -d config/certs;
        fi;
        # WS3.1 mTLS: dedicated filebeat CLIENT cert (CA-signed PEM). The Beats input
        # requires client auth (ssl_certificate_authorities is set), so Filebeat must
        # present its own identity or Logstash rejects the batch with "tls: certificate
        # required". certutil emits a PKCS1 key, which Filebeat (Go TLS) reads natively —
        # no PKCS8 conversion needed (unlike the logstash server key).
        if [ ! -f config/certs/filebeat/filebeat.crt ]; then
          echo "Creating filebeat client cert (WS3.1 Beats mTLS)";
          printf "instances:\n  - name: filebeat\n    dns:\n      - filebeat\n      - localhost\n" > config/certs/fb-instances.yml;
          bin/elasticsearch-certutil cert --silent --pem -out config/certs/fb.zip --in config/certs/fb-instances.yml --ca-cert config/certs/ca/ca.crt --ca-key config/certs/ca/ca.key;
          unzip config/certs/fb.zip -d config/certs;
        fi;
        echo "Setting file permissions";
        chown -R root:root config/certs;
        find . -type d -exec chmod 750 \{\} \;;
        find . -type f -exec chmod 640 \{\} \;;
        # Logstash runs as the non-root `logstash` user (uid 1000) and must read the
        # CA to verify the ES TLS cert. ca.crt is a PUBLIC certificate, so make the
        # certs path traversable and ca.crt world-readable. The private ca.key and
        # node key stay 640 root:root.
        chmod 755 config/certs config/certs/ca;
        chmod 644 config/certs/ca/ca.crt;
        # WS3.1 fix: the find-chmod above re-set the logstash cert dir to root:root.
        # Logstash runs as uid 1000 and must read its own server cert/key; if they
        # stay root-owned it crashes at startup ("cert file cannot be opened"). The
        # cert_pkcs8 one-shot also fixes ownership, but compose SKIPS it on a partial
        # `up` (its prior run already "completed successfully"), which previously left
        # logstash unable to read its certs. Make setup the authoritative owner so the
        # logstash TLS material is ALWAYS readable by uid 1000, regardless of whether
        # cert_pkcs8 re-runs. (cert_pkcs8 still owns the PKCS8 conversion — openssl is
        # absent from this image.)
        if [ -d config/certs/logstash ]; then
          chown -R 1000:0 config/certs/logstash;
          chmod 750 config/certs/logstash;
          chmod 640 config/certs/logstash/*;
        fi;
        # WS0.5: the snapshots named volume mounts as root:root, but the ES process
        # runs as uid 1000 and must create the fs snapshot repo dir under here.
        # Hand it ownership so PUT _snapshot/<repo> can create its blob store.
        echo "Preparing snapshot repository path (WS0.5)";
        mkdir -p /usr/share/elasticsearch/snapshots;
        chown 1000:0 /usr/share/elasticsearch/snapshots;
        chmod 770 /usr/share/elasticsearch/snapshots;
        echo "Setup complete (certs only). Password/role/user provisioning runs in soc_provision after ES is healthy (WS2.4 deadlock+race fix).";
      '
    healthcheck:
      test: ["CMD-SHELL", "[ -f config/certs/elasticsearch/elasticsearch.crt ]"]
      interval: 5s
      timeout: 5s
      retries: 120

  # WS2.4: post-ES provisioning — set the kibana_system password and bootstrap the
  # least-privilege roles/users. Split out of `setup` so setup (cert-gen) finishes
  # WITHOUT waiting on ES; that circular wait was the `docker compose up` deadlock, and
  # gating ES on setup HEALTHY then caused a one-shot race ("exited (0)"). With the split,
  # ES depends on setup COMPLETED (certs present) and this runs once ES is healthy.
  # Idempotent (every PUT is an upsert); kibana/logstash/roles/ai-agent depend on it.
  provision:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION:-9.3.2}
    container_name: soc_provision
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - KIBANA_PASSWORD=${KIBANA_PASSWORD}
      - LOGSTASH_PASSWORD=${LOGSTASH_PASSWORD}
      - SOC_AGENT_KIBANA_PASSWORD=${SOC_AGENT_KIBANA_PASSWORD:-}
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
    working_dir: /usr/share/elasticsearch
    networks:
      - soc-mesh-net
    command: >
      bash -c '
        echo "Waiting for Elasticsearch";
        until curl -s --cacert config/certs/ca/ca.crt https://elasticsearch:9200 | grep -q "missing authentication credentials"; do sleep 5; done;
        echo "Setting kibana_system password";
        until curl -s -X POST --cacert config/certs/ca/ca.crt -u "elastic:${ELASTIC_PASSWORD}" -H "Content-Type: application/json" https://elasticsearch:9200/_security/user/kibana_system/_password -d "{\"password\":\"${KIBANA_PASSWORD}\"}" | grep -q "^{}"; do sleep 5; done;
        echo "Provisioning least-privilege logstash_writer role";
        curl -s -X PUT --cacert config/certs/ca/ca.crt -u "elastic:${ELASTIC_PASSWORD}" -H "Content-Type: application/json" https://elasticsearch:9200/_security/role/logstash_writer -d "{\"cluster\":[\"monitor\",\"manage_index_templates\",\"manage_ilm\"],\"indices\":[{\"names\":[\"logstash-*\",\"soar-actions-*\"],\"privileges\":[\"create_index\",\"create\",\"write\",\"manage\"]}]}" > /dev/null;
        echo "Provisioning append-only soc_audit_appender role (WS3.3 tamper-evident audit)";
        curl -s -X PUT --cacert config/certs/ca/ca.crt -u "elastic:${ELASTIC_PASSWORD}" -H "Content-Type: application/json" https://elasticsearch:9200/_security/role/soc_audit_appender -d "{\"indices\":[{\"names\":[\"soc-audit-*\"],\"privileges\":[\"create_index\",\"create\"]}]}" > /dev/null;
        echo "Provisioning logstash_internal user (logstash_writer + append-only audit)";
        curl -s -X PUT --cacert config/certs/ca/ca.crt -u "elastic:${ELASTIC_PASSWORD}" -H "Content-Type: application/json" https://elasticsearch:9200/_security/user/logstash_internal -d "{\"password\":\"${LOGSTASH_PASSWORD}\",\"roles\":[\"logstash_writer\",\"soc_audit_appender\"],\"full_name\":\"Logstash writer (Suburban-SOC)\"}" > /dev/null;
        if [ x${SOC_AGENT_KIBANA_PASSWORD} != x ]; then
          echo "Provisioning soc_agent_cases role + soc_agent user (WS2.3 Kibana Cases)";
          curl -s -X PUT --cacert config/certs/ca/ca.crt -u "elastic:${ELASTIC_PASSWORD}" -H "Content-Type: application/json" https://elasticsearch:9200/_security/role/soc_agent_cases -d "{\"applications\":[{\"application\":\"kibana-.kibana\",\"privileges\":[\"feature_generalCases.all\"],\"resources\":[\"*\"]}]}" > /dev/null;
          curl -s -X PUT --cacert config/certs/ca/ca.crt -u "elastic:${ELASTIC_PASSWORD}" -H "Content-Type: application/json" https://elasticsearch:9200/_security/user/soc_agent -d "{\"password\":\"${SOC_AGENT_KIBANA_PASSWORD}\",\"roles\":[\"soc_agent_cases\"],\"full_name\":\"SOC AI agent (Kibana Cases)\"}" > /dev/null;
        fi;
        echo "Provisioning complete.";
      '

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION:-9.3.2}
    container_name: elasticsearch
    # WS2.4: survive host/Docker restarts. Without a policy the pipeline stays dead
    # after a reboot (only restart-enabled services recover) -> unbounded ingest lag.
    restart: unless-stopped
    mem_limit: 3g          # audit P2-3: cap so a noisy container can't starve the host
    depends_on:
      setup:
        # WS2.4: setup does CERT GEN ONLY and exits (no ES wait), so gating on its clean
        # completion is safe — no circular deadlock, and no service_healthy race on a
        # one-shot that exits (which broke `up` with "dependency failed to start:
        # exited (0)"). ES-dependent provisioning moved to the soc_provision service.
        condition: service_completed_successfully
    environment:
      - node.name=elasticsearch
      - cluster.name=${CLUSTER_NAME:-suburban-soc}
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.key=certs/elasticsearch/elasticsearch.key
      - xpack.security.http.ssl.certificate=certs/elasticsearch/elasticsearch.crt
      - xpack.security.http.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.key=certs/elasticsearch/elasticsearch.key
      - xpack.security.transport.ssl.certificate=certs/elasticsearch/elasticsearch.crt
      - xpack.security.transport.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.license.self_generated.type=${LICENSE:-basic}
      # WS0.5: register the filesystem snapshot repository path. The fs repo
      # `suburban-soc-snapshots` (location "suburban-soc") lives under here, and the
      # SLM policy snapshots into it so ILM's wait_for_snapshot can gate deletes.
      - path.repo=/usr/share/elasticsearch/snapshots
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
    ports:
      - ${ES_PORT:-9200}:9200
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
      - suburban_soc_data:/usr/share/elasticsearch/data
      - suburban_soc_snapshots:/usr/share/elasticsearch/snapshots
    networks:
      - soc-mesh-net
    # Healthcheck now expects an authenticated-required response over HTTPS, proving
    # security is actually on (a 200 here would mean anonymous access — a failure).
    healthcheck:
      test:
        ["CMD-SHELL",
         "curl -s --cacert config/certs/ca/ca.crt https://localhost:9200 | grep -q 'missing authentication credentials'"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 60s

  kibana:
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION:-9.3.2}
    container_name: kibana
    restart: unless-stopped   # WS2.4: recover after host/Docker restart
    mem_limit: 2g          # audit P2-3
    depends_on:
      elasticsearch:
        condition: service_healthy
      provision:                              # WS2.4: needs the kibana_system password
        condition: service_completed_successfully
    environment:
      - SERVERNAME=kibana
      - ELASTICSEARCH_HOSTS=https://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
      - ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES=config/certs/ca/ca.crt
      # Encryption keys for saved objects / reporting (set in .env)
      - XPACK_SECURITY_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY}
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY}
      - XPACK_REPORTING_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY}
    ports:
      - ${KIBANA_PORT:-5601}:5601
    volumes:
      - certs:/usr/share/kibana/config/certs
    networks:
      - soc-mesh-net
    healthcheck:
      test:
        ["CMD-SHELL",
         "curl -s -I http://localhost:5601 | grep -q 'HTTP/1.1 302 Found'"]
      interval: 10s
      timeout: 10s
      retries: 24
      start_period: 60s

  # WS3.1: convert the logstash PEM key to PKCS8 (the Beats SSL input requires it)
  # and hand the cert/key to logstash (uid 1000). Runs in the logstash image because
  # it ships openssl; the ES setup image does not. Idempotent — skips if already done.
  cert_pkcs8:
    image: docker.elastic.co/logstash/logstash:${STACK_VERSION:-9.3.2}
    container_name: soc_cert_pkcs8
    user: "0"
    depends_on:
      setup:
        condition: service_completed_successfully
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        C=/usr/share/logstash/config/certs/logstash
        if [ ! -f "$$C/logstash.pkcs8.key" ]; then
          echo "Converting logstash key to PKCS8 (WS3.1 Beats TLS)";
          openssl pkcs8 -topk8 -inform PEM -in "$$C/logstash.key" -out "$$C/logstash.pkcs8.key" -nocrypt;
        fi
        chown -R 1000:0 "$$C"; chmod 750 "$$C"; chmod 640 "$$C"/*;
        echo "logstash TLS material ready (WS3.1)"
    volumes:
      - certs:/usr/share/logstash/config/certs
    networks:
      - soc-mesh-net

  # audit P1-9: apply the data lifecycle (fs snapshot repo, SLM, ILM policies) and
  # the data-stream index templates BEFORE Logstash writes. Without this, a fresh
  # `up` lets Logstash create dynamically-mapped indices OUTSIDE ILM (the drift that
  # reindex-existing.sh exists to clean up). Idempotent one-shot (every PUT is an
  # upsert); logstash depends on it completing.
  lifecycle:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION:-9.3.2}
    container_name: soc_lifecycle
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ES_URL=https://elasticsearch:9200
      - ES_USER=elastic
      # audit #166 / NIST SC-8: apply-lifecycle.sh/apply-templates.sh now fail
      # closed without a readable CA (see scripts/setup/lib/es_common.sh) —
      # mount + point at the same CA the `roles` one-shot already verifies against.
      - ES_CA=/certs/ca/ca.crt
    volumes:
      - ../../configs/elasticsearch:/lifecycle:ro
      - certs:/certs:ro
    networks:
      - soc-mesh-net
    entrypoint: ["/bin/bash", "-c"]
    command:
      - "bash /lifecycle/apply-lifecycle.sh"

  # audit P1-11: make configs/elasticsearch/roles/*.json the single source of truth
  # for RBAC and actually APPLY it. The role JSONs were applied by nothing and had
  # drifted from the bootstrap roles the `setup` service creates inline (e.g.
  # logstash_writer's asset-inventory-* grant). This idempotent one-shot upserts
  # every role JSON after setup (which already created the users that reference
  # them), so the committed definitions win. scripts/setup/apply_roles.sh is the
  # host-run equivalent over the same files. Uses --cacert (not -k).
  roles:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION:-9.3.2}
    container_name: soc_roles
    depends_on:
      provision:                              # WS2.4: ES + bootstrap roles/users exist first
        condition: service_completed_successfully
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    volumes:
      - ../../configs/elasticsearch/roles:/roles:ro
      - certs:/certs:ro
    networks:
      - soc-mesh-net
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail
        for f in /roles/*.json; do
          role=$$(basename "$$f" .json)
          code=$$(curl -s -o /dev/null -w '%{http_code}' --cacert /certs/ca/ca.crt \
            -u "elastic:$${ELASTIC_PASSWORD}" -X PUT \
            "https://elasticsearch:9200/_security/role/$$role" \
            -H 'Content-Type: application/json' --data-binary "@$$f")
          printf '    role %-26s -> HTTP %s\n' "$$role" "$$code"
        done
        echo "RBAC roles installed (audit P1-11)."

  logstash:
    image: docker.elastic.co/logstash/logstash:${STACK_VERSION:-9.3.2}
    container_name: logstash
    restart: unless-stopped   # WS2.4: recover after host/Docker restart
    mem_limit: 2g          # WS2.4: raised from 1500m to fit a 1g heap + overhead (host has ample RAM)
    depends_on:
      elasticsearch:
        condition: service_healthy
      provision:                              # WS2.4: needs the logstash_internal user
        condition: service_completed_successfully
      cert_pkcs8:
        condition: service_completed_successfully
      lifecycle:
        condition: service_completed_successfully
    environment:
      - LS_JAVA_OPTS=-Xms1g -Xmx1g   # WS2.4: raised from 512m to reduce GC pressure / backpressure under burst
      # Least-privilege ES credentials consumed by configs/logstash.conf output.
      - LOGSTASH_ES_USER=logstash_internal
      - LOGSTASH_ES_PASS=${LOGSTASH_PASSWORD}
      - ELASTIC_HOSTS=https://elasticsearch:9200
      # Secret for signing the SOAR /alert webhook to the AI agent (WS0.2).
      - SOC_AGENT_HMAC_SECRET=${SOC_AGENT_HMAC_SECRET}
      # WS1.1: ntfy push topic (de-hardcoded). The logstash.conf output reads it as
      # ${NTFY_TOPIC:subsoc-alerts}; set per deployment in .env.
      - NTFY_TOPIC=${NTFY_TOPIC:-subsoc-alerts}
    ports:
      - 5044:5044
    volumes:
      - certs:/usr/share/logstash/config/certs
      # Single source of truth: the repo-root pipeline config is mounted directly
      # (path is relative to this compose file at scripts/setup/). No copy/sync step.
      - ../../configs/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    networks:
      - soc-mesh-net

  ai-agent:
    build:
      context: ./ai_agent
    container_name: soc_ai_agent
    mem_limit: 512m        # audit P2-3
    depends_on:
      elasticsearch:
        condition: service_healthy
      provision:                              # WS2.4: needs the logstash_internal user
        condition: service_completed_successfully
      hive-mind-broker:
        condition: service_started
    environment:
      # SOAR feedback loop writes to ES over HTTPS, authenticated. Reuses the
      # least-privilege logstash_internal writer (WS3.2 will split per-component
      # accounts). The CA is mounted read-only from the shared certs volume.
      - ES_HOST=https://elasticsearch:9200
      - ES_USER=logstash_internal
      - ES_PASS=${LOGSTASH_PASSWORD}
      - ES_CA=/certs/ca/ca.crt
      # WS2.3: Kibana Cases — the agent opens/updates a tracked case per /alert as the
      # least-privilege `soc_agent` user (generalCases feature). Unset password =>
      # case tracking is skipped (alert handling still works).
      - KIBANA_URL=http://kibana:5601
      - KIBANA_AGENT_USER=soc_agent
      - KIBANA_AGENT_PASS=${SOC_AGENT_KIBANA_PASSWORD:-}
      # Shared secret for HMAC-signed /alert requests (WS0.2). Required — the
      # endpoint fails closed (503/401) if unset or the signature is wrong.
      - SOC_AGENT_HMAC_SECRET=${SOC_AGENT_HMAC_SECRET}
      # #109: route quarantine through the broker (the slim agent has no ssh/sudo).
      # The agent signs /webhook/dispatch with HIVE_MIND_SECRET (must equal the
      # broker's). If unset, _execute_isolation fails closed (never dispatches).
      - BROKER_URL=${BROKER_URL:-http://hive_mind_broker:8000}
      - HIVE_MIND_SECRET=${HIVE_MIND_SECRET:-}
      # Notification / LLM secrets (WS0.4) — sourced from .env, no code defaults.
      # Unset values degrade gracefully (push/triage skipped).
      - NTFY_TOPIC=${NTFY_TOPIC:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_API_URL=${LLM_API_URL:-https://api.openai.com/v1/chat/completions}
      - LLM_MODEL=${LLM_MODEL:-gpt-4}
      # Allow sending sanitised telemetry to a HOSTED LLM (default false = local-only).
      - LLM_ALLOW_HOSTED=${LLM_ALLOW_HOSTED:-false}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      # §12.4 exclusion list, mounted read-only below (without this the agent could
      # not enforce the never-isolate list inside the container).
      - EXCLUSION_LIST=/governance/exclusion_list.txt
    ports:
      # Bound to localhost only — the agent is NOT reachable from the LAN. /alert
      # additionally requires a valid HMAC signature.
      - "127.0.0.1:5000:5000"
    volumes:
      - certs:/certs:ro
      - ../../governance:/governance:ro
    networks:
      - soc-mesh-net
    restart: unless-stopped

  # --- Hive-Mind broker: authenticated router-block dispatcher (#109) ----------
  # The slim AI agent can't ssh/sudo a router, so it routes containment here over
  # an HMAC webhook. The broker owns the per-tenant router inventory and applies
  # the nftables block. Not LAN-exposed; only the agent (holding HIVE_MIND_SECRET)
  # can reach /webhook/dispatch.
  hive-mind-broker:
    build:
      context: ../hive-mind-broker
    container_name: hive_mind_broker
    mem_limit: 256m        # audit P2-3
    environment:
      # Must equal the agent's HIVE_MIND_SECRET. Broker fails closed (503) if unset.
      - HIVE_MIND_SECRET=${HIVE_MIND_SECRET:-}
      # §12.4 exclusion list, mounted from the repo's governance dir (below).
      - EXCLUSION_LIST=/governance/exclusion_list.txt
      # Legacy auto-block on /webhook/alert stays OFF; the agent owns approval.
      - AUTONOMOUS_BLOCK_ENABLED=${AUTONOMOUS_BLOCK_ENABLED:-false}
      # SSH host-key verification (audit P1-3). Default strict: the broker verifies
      # router host keys against /home/broker/.ssh/known_hosts (pin them with
      # `ssh-keyscan -t ed25519 <router> >> ~/.ssh/known_hosts` on the host — it is
      # mounted below). Set BROKER_INSECURE_SSH=true ONLY for a lab/first run to skip
      # verification (logs loudly).
      - BROKER_INSECURE_SSH=${BROKER_INSECURE_SSH:-false}
    volumes:
      # Host-specific secrets — mounted read-only, never baked into the image.
      # inventory.yaml is gitignored; copy it from inventory.example.yaml first.
      - ../hive-mind-broker/inventory.yaml:/app/inventory.yaml:ro
      - ../../governance:/governance:ro
      # SSH key(s) the broker uses to reach routers (path per inventory.yaml).
      # Compose does NOT expand `~`, so default to an absolute ${HOME}/.ssh; set
      # HIVE_MIND_SSH_DIR to an absolute path to override (required on Windows hosts).
      # Mounted at the non-root `broker` user's home (audit P1-4); dispatcher.py
      # expanduser()s the inventory ssh_key_path (~/.ssh/...) to /home/broker/.ssh.
      - ${HIVE_MIND_SSH_DIR:-${HOME}/.ssh}:/home/broker/.ssh:ro
    ports:
      # Localhost only — for debugging/verification; the agent uses the service name.
      - "127.0.0.1:8000:8000"
    networks:
      - soc-mesh-net
    restart: unless-stopped

networks:
  soc-mesh-net:
    driver: bridge

volumes:
  certs:
  suburban_soc_data:
  # WS0.5: persistent store for the fs snapshot repository (snapshot-before-delete).
  suburban_soc_snapshots:
