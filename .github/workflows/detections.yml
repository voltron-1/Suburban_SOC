name: Detections CI

# WS1.2 detection-as-code gate: validate that the Sigma rules are the single source
# of truth and convert cleanly to Elastic detection rules. (Full experimental->stable
# promotion gating on replayable fixtures is WS2.1.)
# audit #168: runs on EVERY PR, no path filter — a change that looks unrelated
# must not silently skip this gate. Known tradeoff: this also means the
# pysigma MITRE-ATT&CK-data-fetch flakiness (external, rate-limited) can now
# surface on any PR, not just detection-focused ones — not fixable from here.
on:
  pull_request:
  workflow_dispatch:

jobs:
  detections:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install the Sigma toolchain
        run: pip install --quiet sigma-cli pysigma-backend-elasticsearch

      - name: Framework-enrichment consistency tests
        run: python tests/pipeline/test_framework_enrichment.py

      - name: Detection fixture tests (WS2.1 — TP fires, TN regression, promotion gate)
        run: python tests/detections/test_sigma_detections.py

      - name: Threshold-rule companions are well-formed and paired (issue #192)
        run: python tests/detections/test_threshold_rules.py

      - name: Every Sigma rule converts to an Elastic detection rule
        run: |
          set -euo pipefail
          n_rules=$(ls rules/sigma/*.yml | wc -l)
          sigma convert -t lucene -f siem_rule_ndjson \
            -p configs/detections/suburban-soc-ecs.yml rules/sigma/*.yml 2>err.log \
            | grep '^{' > converted.ndjson || { echo "::error::sigma conversion failed"; cat err.log; exit 1; }
          n_conv=$(wc -l < converted.ndjson)
          echo "Converted $n_conv / $n_rules Sigma rules."
          test "$n_conv" -eq "$n_rules" || { echo "::error::expected $n_rules converted rules, got $n_conv"; exit 1; }
          # Each converted rule must query our ECS fields, not the ECS-standard
          # process.command_line (this stack uses process.args).
          ! grep -q "process.command_line" converted.ndjson || { echo "::error::rule queries process.command_line; pipeline mapping is wrong"; exit 1; }

      - name: ATT&CK coverage matrix is in sync with the rules (WS1.5)
        run: python scripts/setup/build_attack_coverage.py --check

      - name: SIEM KQL docs are in sync with the rules (audit P1-18)
        run: python scripts/setup/build_kql_docs.py --check

      - name: Emulation-to-telemetry map is wired up (purple-team loop is real)
        # Fails on ERRORs only (a referenced sim/rule/log-source is missing, i.e.
        # the map has drifted). Tag-match and exec-bit issues surface as WARN in
        # the log without failing — exec bit is meaningless for .ps1 on Linux, and
        # the .sh sims are committed mode 644.
        run: python tests/validate_emulation_map.py --no-color

      - name: Hunt library is well-formed (WS2.2)
        run: |
          python - <<'PY'
          import glob, sys, yaml
          required = {"id", "title", "hypothesis", "attack", "data_source", "query"}
          hunts = sorted(glob.glob("hunts/*.yml"))
          assert len(hunts) >= 5, f"expected >=5 hunts, found {len(hunts)}"
          bad = []
          for f in hunts:
              h = yaml.safe_load(open(f, encoding="utf-8"))
              missing = required - set(h or {})
              if missing:
                  bad.append(f"{f}: missing {sorted(missing)}")
              if h and h.get("status") == "promoted" and not h.get("promoted_to"):
                  bad.append(f"{f}: status=promoted but no promoted_to")
          assert not bad, "malformed hunts: " + "; ".join(bad)
          print(f"OK: {len(hunts)} hunts well-formed.")
          PY
