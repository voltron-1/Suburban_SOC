title: Windows Service Creation via Sc.exe
id: a1c1f002-0002-4a02-9002-000000000002
status: stable
description: Detects creation of a new Windows service with sc.exe, frequently abused for persistence and privilege escalation.
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\sc.exe'
        CommandLine|contains|all:
            - 'create'
            - 'binpath'
    condition: selection
falsepositives:
    - Legitimate software installing a service.
level: medium
tags:
    - attack.persistence
    - attack.privilege_escalation
    - attack.t1543.003
