title: Payload Decoding via Certutil
id: a1c1f005-0005-4a05-9005-000000000005
status: stable
description: Detects certutil.exe used to decode a base64/hex-encoded file, a common way to deobfuscate a dropped payload.
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\certutil.exe'
        CommandLine|contains: 'decode'
    condition: selection
falsepositives:
    - Rare legitimate certificate encoding/decoding workflows.
level: medium
tags:
    - attack.defense_evasion
    - attack.t1140
