title: Mshta Remote or Script Payload Execution
id: 88888888-8888-8888-8888-888888888888
status: stable
description: >
  Detects mshta.exe proxy-executing a remote HTA or inline javascript/vbscript
  payload (System Binary Proxy Execution). Promoted from threat hunt HUNT-001.
references:
    - hunts/HUNT-001-mshta-remote.yml
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\mshta.exe'
        CommandLine|contains:
            - 'http'
            - 'javascript'
            - 'vbscript'
    condition: selection
falsepositives:
    - Rare legitimate HTA-based administrative tooling.
level: high
tags:
    - attack.defense_evasion
    - attack.t1218.005
